    - SZSE
  require_is_etf: true
  exclude_qdii: true
  exclude_leveraged_inverse: true
  min_listed_days: 365
  min_avg_turnover_1m_cny: 25000000
  min_aum_cny: 1000000000
  min_bucket_fit_score: 60

anchors:
